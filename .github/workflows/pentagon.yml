name: 5-Cloud Pentagon

on:
  schedule:
    - cron: '0 0 * * *' # Or whatever your schedule is
  workflow_dispatch: # Allows manual re-runs

jobs:
  pentagon:
    runs-on: ubuntu-latest
    
    # CRITICAL: Grant the runner access to write to the repository
    permissions:
      contents: write
      actions: write

    steps:
      # Step 1: Initialize the virtual workspace environment cleanly
      - name: Checkout Substrate Repository
        uses: actions/checkout@v4

      # Step 2: Use standard relative paths ($GITHUB_WORKSPACE) to bypass write restrictions
      - name: Initialize Shielding Matrices
        run: |
          mkdir -p $GITHUB_WORKSPACE/BlackBoxDefense
          echo "Initializing core security layer..." > $GITHUB_WORKSPACE/BlackBoxDefense/file_1.txt
