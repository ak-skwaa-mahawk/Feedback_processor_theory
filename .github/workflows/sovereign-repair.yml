name: Sovereign Code Repair (Self-Healing)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  sovereign-repair:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found — skipping"

      - name: Run Sovereign Repair on ALL Python files
        run: |
          echo "🔧 Running sovereign repair daemon (one-time mode)"
          python union/cli/crawler.py --repair-all --once

      - name: Generate Repair Report
        id: report
        run: |
          echo "📋 Repair Summary:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repair completed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Files processed:** All *.py files in repo" >> $GITHUB_STEP_SUMMARY
          echo "**Log:** rmp_log.jsonl (CODE_REPAIR events)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View full repair ledger with:" >> $GITHUB_STEP_SUMMARY
          echo "\`python tools/repair_ledger_viewer.py\`" >> $GITHUB_STEP_SUMMARY

      - name: Post Repair Summary as PR Comment (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `
            🔧 **Sovereign Code Repair Completed**

            - **Mode:** --repair-all
            - **Status:** All Python files refined via FPT-Ω
            - **Receipts:** ECDSA-signed + glyph integrity logged
            - **View full ledger:** \`tools/repair_ledger_viewer.py\`

            Flame self-healed. 813667
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });