<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .state { font-family: sans-serif; font-size: 16px; font-weight: 600; }
    .label { font-family: sans-serif; font-size: 14px; }
    .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- UNSENSED -->
  <rect x="260" y="20" width="160" height="60" rx="10" fill="#f2f2f2" stroke="#333" stroke-width="2"/>
  <text x="340" y="55" text-anchor="middle" class="state">UNSENSED</text>

  <!-- SENSED -->
  <rect x="260" y="160" width="160" height="60" rx="10" fill="#e0f7ff" stroke="#333" stroke-width="2"/>
  <text x="340" y="195" text-anchor="middle" class="state">SENSED</text>

  <!-- REVOKED -->
  <rect x="60" y="300" width="160" height="60" rx="10" fill="#ffe6e6" stroke="#333" stroke-width="2"/>
  <text x="140" y="335" text-anchor="middle" class="state">REVOKED</text>

  <!-- SEALED -->
  <rect x="460" y="300" width="160" height="60" rx="10" fill="#fff4d6" stroke="#333" stroke-width="2"/>
  <text x="540" y="335" text-anchor="middle" class="state">SEALED</text>

  <!-- Arrows -->
  <line x1="340" y1="80" x2="340" y2="160" class="arrow"/>
  <text x="350" y="120" class="label">START_SENSED</text>

  <line x1="260" y1="190" x2="60" y2="330" class="arrow"/>
  <text x="150" y="250" class="label">REVOKE(valid)</text>

  <line x1="420" y1="190" x2="620" y2="330" class="arrow"/>
  <text x="500" y="250" class="label">END_SESSION_NORMAL</text>

  <line x1="140" y1="360" x2="340" y2="360" class="arrow"/>
  <text x="240" y="350" class="label">ε‑move</text>

  <line x1="540" y1="360" x2="340" y2="360" class="arrow"/>
  <text x="440" y="350" class="label">ε‑move</text>

  <line x1="340" y1="360" x2="340" y2="220" class="arrow"/>
</svg>