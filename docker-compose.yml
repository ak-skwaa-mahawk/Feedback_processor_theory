services:
  n8n-relay:
    image: n8nio/n8n:1.123.17 # Hardened and verified
    restart: unless-stopped
    # Use a non-root user (node) mapped to a low-priv host UID
    user: "1000:1000"
    environment:
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    # Starve the process of filesystem write access
    read_only: true
    tmpfs:
      - /home/node/.n8n:size=50M
      - /tmp:size=10M
    volumes:
      - ./n8n_data:/home/node/.n8n:rw # Persistent database storage
    # Security capabilities: Drop everything
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

version: '3.8'
services:
  lan999-vault:
    image: python:3.11-slim
    volumes:
      - ./codex:/app/codex
      - ./psbt:/app/psbt
      - ./bitcoin:/root/.bitcoin
    environment:
      - BITCOIN_RPC_USER=landback
      - BITCOIN_RPC_PASSWORD=vault999
    command: >
      sh -c "pip install -r requirements.txt && python vault_lan999.py"
    depends_on:
      - bitcoind
    restart: unless-stopped

  bitcoind:
    image: ruimarinho/bitcoin-core:25.0
    command: -rpcuser=landback -rpcpassword=vault999 -rpcallowip=172.0.0.0/8
    volumes:
      - bitcoin-data:/root/.bitcoin
    ports:
      - "8332:8332"

volumes:
  bitcoin-data: