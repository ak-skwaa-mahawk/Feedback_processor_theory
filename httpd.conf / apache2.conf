# Core hardening
ServerTokens Prod
ServerSignature Off
TraceEnable Off
ServerName localhost
PidFile "/run/httpd/httpd.pid"

# Disable unnecessary features
Options -Indexes -FollowSymLinks -Includes -ExecCGI
AllowOverride None

# Security headers (global)
Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "DENY"
Header always set X-XSS-Protection "1; mode=block"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'"

# Disable .htaccess entirely
AccessFileName .htaccess
<Files \~ "^\.ht">
    Require all denied
</Files>

# Disable server info/status
<Location /server-status>
    Require all denied
</Location>

<Location /server-info>
    Require all denied
</Location>

<Directory />
    Require all denied
</Directory>

<Directory /usr/share/httpd>
    Require all granted
    Options -Indexes
</Directory>

<Directory /var/www/html>
    Require all granted
    Options -Indexes -FollowSymLinks -Includes -ExecCGI
    AllowOverride None
</Directory>

<Directory /var/www/uploads>
    Options -ExecCGI -Indexes
    AddHandler text/plain .php .php3 .phtml .cgi .pl .py .jsp .asp .aspx
    php_admin_flag engine off
    Require all granted
</Directory>

<VirtualHost *:80>
    ServerName example.ndt-bot.local
    Redirect permanent / https://example.ndt-bot.local/
</VirtualHost>

SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
SSLCipherSuite ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
SSLHonorCipherOrder on
SSLUseStapling on
SSLStaplingCache shmcb:/run/httpd/sslcache(512000)
# Block known exploited paths
RewriteCond %{REQUEST_URI} (\.\./|%2e%2e/|%252e%252e/) [NC,OR]
RewriteCond %{QUERY_STRING} (cmd|exec|shell) [NC]
RewriteRule ^ - [F,L]
# Add these inside <Directory /var/www/html>
Require all granted
Options -Indexes -FollowSymLinks -Includes -ExecCGI
AllowOverride None
Order allow,deny
Allow from 127.0.0.1 ::1  # Only localhost or VPN

# Force HTTPS everywhere (already good, but tighten)
<VirtualHost *:80>
    ServerName ndt-bot.local
    Redirect permanent / https://ndt-bot.local/
</VirtualHost>