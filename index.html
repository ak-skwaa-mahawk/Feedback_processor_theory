<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skoden Injin • EMPIRICAL_v3.4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body { margin:0; padding:0; background:transparent; color:#e2e8f0; font-family:'Inter',sans-serif; overflow:hidden; }
        #skoden-unified-system {
            max-width:620px; margin:5px auto; background:radial-gradient(circle at center, #0a0f1c 0%, #02040a 100%);
            border:1px solid #1e2937; border-radius:12px; box-shadow:0 15px 35px rgba(0,0,0,0.95); overflow:hidden;
        }
        .header { background:#0f172a; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
        .canvas-container { width:100%; height:140px; background:#000; position:relative; border-bottom:1px solid #1e2937; }
        #convergenceCanvas { width:100%; height:100%; display:block; }
        .terminal { background:rgba(5,8,16,0.92); border:1px solid #1e2937; border-radius:8px; padding:14px; height:140px; overflow-y:auto; font-family:monospace; font-size:12.5px; line-height:1.55; color:#cbd5e1; }
        .input-capsule { display:flex; align-items:center; background:#0f172a; border:1px solid #1e2937; border-radius:24px; padding:4px 4px 4px 14px; margin:12px 0; }
        .input-capsule input { flex:1; background:transparent; border:none; outline:none; color:#f8fafc; font-size:13.5px; }
        .execute-btn { background:#22ffcc; color:#0f172a; border:none; width:28px; height:28px; border-radius:50%; font-size:13px; font-weight:bold; cursor:pointer; }
        .status-bar { font-size:11px; padding:4px 12px; background:#1e2937; display:flex; justify-content:space-between; align-items:center; }
    </style>
</head>
<body>

<div id="skoden-unified-system">
    <div class="header" onclick="toggleSystemWorkspace()">
        <div style="display:flex; align-items:center; gap:10px;">
            <span style="color:#22ffcc; font-size:16px;">🔥</span>
            <span style="font-size:15px; color:#f1f5f9;">Skoden injin</span>
            <span style="font-size:9px; background:#1e2937; padding:2px 6px; border-radius:4px; color:#64748b;">EMPIRICAL_v3.4</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
            <span id="ws-dot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;"></span>
            <span id="ws-status-text" style="color:#ef4444;font-size:11px;">DISCONNECTED</span>
        </div>
    </div>

    <div id="system-expansion-drawer">
        <div class="canvas-container">
            <canvas id="convergenceCanvas"></canvas>
        </div>

        <div style="padding:16px;">
            <div id="terminal" class="terminal">>> Initializing Floor Node connection...</div>

            <div class="input-capsule">
                <input type="text" id="terminal-input" placeholder="Ask uncle..." onkeydown="if(event.key==='Enter') sendCommand()">
                <button class="execute-btn" onclick="sendCommand()">➔</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>
    let ws;
    let reconnectAttempts = 0;
    const MAX_RECONNECT = 10;
    let heartbeatInterval;
    let lastPong = Date.now();

    function updateWSStatus(connected) {
        const dot = document.getElementById('ws-dot');
        const text = document.getElementById('ws-status-text');
        if (connected) {
            dot.style.background = '#22ffcc';
            text.textContent = 'CONNECTED';
            text.style.color = '#22ffcc';
        } else {
            dot.style.background = '#ef4444';
            text.textContent = 'DISCONNECTED';
            text.style.color = '#ef4444';
        }
    }

    function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: "ping", ts: Date.now()}));
                
                // Timeout detection
                if (Date.now() - lastPong > 15000) {
                    console.warn("Heartbeat timeout → forcing reconnect");
                    ws.close();
                }
            }
        }, 8000);
    }

    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.hostname || '192.168.4.1';
        ws = new WebSocket(`\( {protocol}// \){host}:81`);

        ws.onopen = () => {
            console.log("✅ WebSocket connected");
            updateWSStatus(true);
            reconnectAttempts = 0;
            lastPong = Date.now();
            startHeartbeat();
            document.getElementById('terminal').innerHTML += "\n>> Floor Node connected.\n";
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === "pong") {
                    lastPong = Date.now();
                    return;
                }
                // Handle normal telemetry
                if (data.pi_r !== undefined) {
                    rotationalVelocity = (data.pi_r || 3.14) * 0.8;
                    document.getElementById('energy-val').textContent = (data.pi_deg || 0).toFixed(2) + "°";
                }
            } catch(e) {}
        };

        ws.onclose = () => {
            updateWSStatus(false);
            attemptReconnect();
        };

        ws.onerror = () => {
            updateWSStatus(false);
        };
    }

    function attemptReconnect() {
        if (reconnectAttempts < MAX_RECONNECT) {
            reconnectAttempts++;
            console.log(`Reconnecting... (\( {reconnectAttempts}/ \){MAX_RECONNECT})`);
            setTimeout(connectWebSocket, 1200 * reconnectAttempts);
        }
    }

    function sendCommand() {
        const input = document.getElementById('terminal-input');
        const cmd = input.value.trim();
        if (!cmd || !ws || ws.readyState !== WebSocket.OPEN) return;

        const term = document.getElementById('terminal');
        term.innerHTML += `\n>> You: ${cmd}\n`;
        term.scrollTop = term.scrollHeight;

        ws.send(JSON.stringify({command: cmd}));
        input.value = '';
    }

    // Three.js setup (minimal)
    let scene, camera, renderer, knotMesh;
    function initThreeEngine() {
        const container = document.querySelector('.canvas-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.z = 3.2;
        renderer = new THREE.WebGLRenderer({canvas: document.getElementById('convergenceCanvas'), antialias:true});
        renderer.setSize(container.clientWidth, container.clientHeight);

        const geo = new THREE.TorusKnotGeometry(0.8, 0.18, 120, 16, 3, 4);
        const mat = new THREE.MeshPhongMaterial({color:0x00ffcc, emissive:0x112211, shininess:80});
        knotMesh = new THREE.Mesh(geo, mat);
        scene.add(knotMesh);
        scene.add(new THREE.AmbientLight(0xaaaaaa));
        scene.add(new THREE.PointLight(0x22ffcc, 1.2, 100));

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (knotMesh) {
            knotMesh.rotation.x += rotationalVelocity * 0.001;
            knotMesh.rotation.y += rotationalVelocity * 0.002;
        }
        renderer.render(scene, camera);
    }

    window.onload = () => {
        initThreeEngine();
        connectWebSocket();
        document.getElementById('terminal-input').focus();
    };
</script>
</body>
</html>
